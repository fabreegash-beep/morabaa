<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dots & Boxes Elite 🏆</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --dark-bg: #0f172a;
            --pink: #ff85a2;
            --blue: #38bdf8;
            --accent: #6366f1;
            --surface: #1e293b;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-bg);
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
            color: white; overflow: hidden;
        }

        /* Lobby Style */
        #lobby { 
            background: rgba(30, 41, 59, 0.7); padding: 40px; border-radius: 30px; 
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
            text-align: center; width: 350px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .input-box { 
            background: #0f172a; border: 2px solid #334155; border-radius: 15px;
            padding: 15px; color: white; width: 100%; box-sizing: border-box;
            font-size: 1.2rem; text-align: center; margin-bottom: 15px;
        }

        .color-palette { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
        .color-dot { 
            width: 35px; height: 35px; border-radius: 10px; cursor: pointer; 
            border: 2px solid transparent; transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .color-dot.selected { border-color: white; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn-primary { background: var(--accent); color: white; margin-bottom: 10px; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }

        /* Game UI */
        #game-area { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 500px; }

        .room-info-bar {
            background: var(--surface); padding: 8px 15px; border-radius: 50px;
            margin-bottom: 20px; display: flex; align-items: center; gap: 15px;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .room-id-tag { color: var(--blue); font-weight: bold; font-family: monospace; font-size: 1.2rem; }

        .score-container { display: flex; gap: 20px; width: 100%; justify-content: center; margin-bottom: 20px; }
        .score-card { 
            flex: 1; background: var(--surface); padding: 15px; border-radius: 20px;
            text-align: center; border: 2px solid transparent; transition: 0.4s;
        }
        .score-card.active { transform: scale(1.05); border-color: currentColor; box-shadow: 0 0 20px currentColor; }
        .score-val { font-size: 1.8rem; font-weight: 800; display: block; }
        .score-label { font-size: 0.8rem; opacity: 0.7; text-transform: uppercase; }

        #timer { 
            font-size: 1.2rem; background: #ef4444; width: 45px; height: 45px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; margin: 10px 0; border: 3px solid rgba(255,255,255,0.2);
        }

        #board { 
            display: grid; background: rgba(255,255,255,0.03); padding: 15px; 
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        
        .dot { width: 8px; height: 8px; background: #64748b; border-radius: 50%; }
        .line { background: #334155; cursor: pointer; transition: 0.2s; border-radius: 4px; }
        .line:hover:not(.taken) { background: #475569; }
        .line.horizontal { height: 8px; width: 50px; }
        .line.vertical { width: 8px; height: 50px; }
        .line.taken { box-shadow: 0 0 12px currentColor; }

        .box { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }
        .emoji-pop { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0) rotate(-45deg); } 100% { transform: scale(1) rotate(0); } }

        .waiting-overlay {
            position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(15,23,42,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; border-radius: 20px; backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div id="lobby">
        <h1 style="margin-bottom:20px; font-size: 1.8rem;">Dots & Boxes 🎮</h1>
        <div class="color-palette" id="lobbyPalette">
            <div class="color-dot selected" style="background: var(--pink)" data-color="#ff85a2" data-emoji="💖">💖</div>
            <div class="color-dot" style="background: var(--blue)" data-color="#38bdf8" data-emoji="💪">💪</div>
            <div class="color-dot" style="background: #4ade80" data-color="#4ade80" data-emoji="🌟">🌟</div>
            <div class="color-dot" style="background: #fbbf24" data-color="#fbbf24" data-emoji="🔥">🔥</div>
            <div class="color-dot" style="background: #a855f7" data-color="#a855f7" data-emoji="🔮">🔮</div>
        </div>
        <button class="btn btn-primary" onclick="joinRoom('create')">أنشئ غرفة وتحدى صديقك</button>
        <div style="margin: 15px 0; opacity: 0.5; font-size: 0.9rem;">أو انضم لغرفة موجودة</div>
        <input type="text" id="roomInput" class="input-box" placeholder="كود الغرفة">
        <button class="btn btn-secondary" onclick="joinRoom('join')">دخول الغرفة</button>
    </div>

    <div id="game-area">
        <div class="room-info-bar">
            <span>كود الغرفة:</span>
            <span id="displayID" class="room-id-tag">------</span>
            <button onclick="copyRoom()" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;">📋</button>
        </div>

        <div class="score-container">
            <div id="card-p1" class="score-card">
                <span class="score-label" id="name-p1">P1</span>
                <span id="val-p1" class="score-val">0</span>
            </div>
            <div id="timer">8</div>
            <div id="card-p2" class="score-card">
                <span class="score-label" id="name-p2">P2</span>
                <span id="val-p2" class="score-val">0</span>
            </div>
        </div>

        <div id="board-container" style="position: relative;">
            <div id="waiting-msg" class="waiting-overlay">
                <div class="spinner" style="border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--blue); width: 40px; height: 40px; border-radius: 50%; animation: spin 1s linear infinite;"></div>
                <p style="margin-top: 15px;">بانتظار الخصم للبدء...</p>
            </div>
            <div id="board"></div>
        </div>
    </div>

    <audio id="sndMove" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="sndTurn" src="https://www.soundjay.com/buttons/button-20.mp3"></audio>
    <audio id="sndHeart" src="https://www.soundjay.com/buttons/button-37.mp3"></audio>
    <audio id="sndGeneral" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>
    // Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBjHyON3NjKz2yBxCqwgLftd2trh03HYQc",
      authDomain: "arabic-game-onlin.firebaseapp.com",
      databaseURL: "https://arabic-game-onlin-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "arabic-game-onlin",
      storageBucket: "arabic-game-onlin.firebasestorage.app",
      messagingSenderId: "406939044821",
      appId: "1:406939044821:web:daa86a2fa46483363f8b5c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let roomID, myRole, currentTurn;
    let myColor = "#ff85a2", myEmoji = "💖";
    let playersData = {};
    let isGameStarted = false;

    // UI Logic
    document.querySelectorAll('.color-dot').forEach(dot => {
        dot.addEventListener('click', () => {
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
            dot.classList.add('selected');
            myColor = dot.dataset.color;
            myEmoji = dot.dataset.emoji;
        });
    });

    async function joinRoom(mode) {
        if(mode === 'create') {
            roomID = Math.floor(100000 + Math.random() * 900000).toString();
            myRole = 1;
            await db.ref('rooms/' + roomID).set({ 
                turn: 1, p1:true, p2:false, c1:myColor, e1:myEmoji, s1:0,
                c2:"#38bdf8", e2:"💪", s2:0, lastMove: "", timeLeft: 8 
            });
        } else {
            roomID = document.getElementById('roomInput').value.trim();
            if(!roomID) return alert("أدخل كود الغرفة");
            const snap = await db.ref('rooms/' + roomID).once('value');
            if(!snap.val()) return alert("الغرفة غير موجودة");
            myRole = 2;
            await db.ref('rooms/' + roomID).update({ p2:true, c2:myColor, e2:myEmoji });
        }
        document.getElementById('displayID').innerText = roomID;
        startGameUI();
    }

    function startGameUI() {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-area').style.display = 'flex';
        
        const board = document.getElementById('board');
        const SIZE = 5;
        board.style.gridTemplateColumns = `repeat(${SIZE}, 8px 50px) 8px`;
        
        for (let r = 0; r <= SIZE; r++) {
            for (let c = 0; c <= SIZE; c++) {
                const dot = document.createElement('div'); dot.className='dot'; board.appendChild(dot);
                if(c < SIZE) addLine(r, c, 'h', board);
            }
            if(r < SIZE) {
                for (let c = 0; c <= SIZE; c++) {
                    addLine(r, c, 'v', board);
                    if(c < SIZE) {
                        const box = document.createElement('div'); box.className='box';
                        box.id = `box-${r}-${c}`; board.appendChild(box);
                    }
                }
            }
        }
        listen();
        if(myRole === 1) startMasterTimer();
    }

    function addLine(r, c, type, container) {
        const l = document.createElement('div');
        l.className = `line ${type==='h'?'horizontal':'vertical'}`;
        l.id = `line-${type}-${r}-${c}`;
        l.onclick = () => {
            if(currentTurn === myRole && isGameStarted && !l.classList.contains('taken')) {
                db.ref(`rooms/${roomID}`).update({
                    lastMove: { r, c, type, p: myRole, t: Date.now() },
                    timeLeft: 8
                });
                document.getElementById('sndMove').play();
            }
        };
        container.appendChild(l);
    }

    function startMasterTimer() {
        setInterval(async () => {
            const snap = await db.ref(`rooms/${roomID}`).once('value');
            const d = snap.val();
            if(!d || !d.p2) return;
            let newTime = d.timeLeft - 1;
            if(newTime <= 0) {
                db.ref(`rooms/${roomID}`).update({ turn: d.turn === 1 ? 2 : 1, timeLeft: 8 });
            } else {
                db.ref(`rooms/${roomID}/timeLeft`).set(newTime);
            }
        }, 1000);
    }

    function listen() {
        let prevTurn = 0;
        db.ref(`rooms/${roomID}`).on('value', snap => {
            const d = snap.val();
            if(!d) return;

            // التحقق من بدء اللعبة
            if(d.p1 && d.p2) {
                isGameStarted = true;
                document.getElementById('waiting-msg').style.display = 'none';
            }

            // تحديث الدور والاصوات
            if(d.turn !== prevTurn) {
                if(d.turn === myRole && isGameStarted) document.getElementById('sndTurn').play();
                prevTurn = d.turn;
            }
            currentTurn = d.turn;

            // تحديث بطاقات النقاط
            playersData = { 1: {c: d.c1, e: d.e1, s: d.s1}, 2: {c: d.c2, e: d.e2, s: d.s2} };
            
            updateScoreCard(1, d.s1, d.c1, d.e1, d.turn === 1);
            updateScoreCard(2, d.s2, d.c2, d.e2, d.turn === 2);

            document.getElementById('timer').innerText = d.timeLeft;

            if(d.lastMove) {
                const m = d.lastMove;
                const line = document.getElementById(`line-${m.type}-${m.r}-${m.c}`);
                if(!line.classList.contains('taken')) {
                    line.style.color = playersData[m.p].c;
                    line.style.background = 'currentColor';
                    line.classList.add('taken');
                    line.setAttribute('data-owner', m.p);
                    checkScoring(m.r, m.c, m.type, m.p);
                }
            }
        });
    }

    function updateScoreCard(pNum, score, color, emoji, isActive) {
        const card = document.getElementById(`card-p${pNum}`);
        const val = document.getElementById(`val-p${pNum}`);
        const name = document.getElementById(`name-p${pNum}`);
        
        val.innerText = score;
        name.innerText = `${emoji} Player ${pNum}`;
        card.style.color = color;
        
        if(isActive && isGameStarted) card.classList.add('active');
        else card.classList.remove('active');
    }

    function checkScoring(r, c, type, p) {
        let scored = false;
        const SIZE = 5;
        const find = (row, col) => {
            if(row<0 || row>=SIZE || col<0 || col>=SIZE) return;
            const lines = [
                document.getElementById(`line-h-${row}-${col}`),
                document.getElementById(`line-h-${row+1}-${col}`),
                document.getElementById(`line-v-${row}-${col}`),
                document.getElementById(`line-v-${row}-${col+1}`)
            ];

            if(lines.every(l => l.classList.contains('taken'))) {
                const b = document.getElementById(`box-${row}-${col}`);
                if(!b.innerHTML) {
                    const e = playersData[p].e;
                    b.innerHTML = `<span class="emoji-pop">${e}</span>`;
                    b.style.background = playersData[p].c + "15";
                    
                    // تشغيل صوت خاص بالقلب أو صوت عام
                    if(e === "💖") document.getElementById('sndHeart').play();
                    else document.getElementById('sndGeneral').play();

                    scored = true;
                    if(myRole === 1) db.ref(`rooms/${roomID}/s${p}`).transaction(s => (s||0)+1);
                }
            }
        };

        if(type==='h') { find(r-1, c); find(r, c); } else { find(r, c-1); find(r, c); }

        if(myRole === 1 && !scored) {
            db.ref(`rooms/${roomID}`).update({ turn: p === 1 ? 2 : 1, timeLeft: 8 });
        }
    }

    function copyRoom() {
        navigator.clipboard.writeText(roomID);
        alert("تم نسخ الكود! أرسله لصديقك الآن.");
    }
</script>

<style>
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</body>
<audio id="background-music" loop autoplay>
  <source src="music.mp3" type="audio/mpeg">
  متصفحك لا يدعم عنصر الصوت.
</audio>

<script>
  // تشغيل الموسيقى تلقائياً بعد تفاعل المستخدم (لأن المتصفحات تمنع التشغيل التلقائي)
  window.addEventListener('load', function() {
    let music = document.getElementById('background-music');
    
    // محاولة تشغيل الموسيقى
    music.play().catch(error => {
      console.log("المتصفح يمنع التشغيل التلقائي. سيتم التشغيل عند أول نقرة.");
      
      // تشغيل الموسيقى عند أول نقرة من المستخدم على الصفحة
      document.body.addEventListener('click', function() {
        music.play();
      }, { once: true });
    });
    
    // ضبط مستوى الصوت (اختياري - 0.5 = نصف الصوت)
    music.volume = 0.5;
  });
</script>
</html>
