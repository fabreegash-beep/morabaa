<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>النقاط والصناديق - لعبة أونلاين</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* شاشة الدخول */
        #lobby {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            width: 450px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #lobby h2 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.8rem;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .color-selector {
            margin: 20px 0;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 20px;
        }

        .color-selector p {
            margin-bottom: 10px;
            color: #2c3e50;
            font-weight: bold;
        }

        .color-options {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .color-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .color-btn.selected {
            border-color: #2c3e50;
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .color-btn[data-color="red"] { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .color-btn[data-color="blue"] { background: linear-gradient(135deg, #3498db, #2980b9); }
        .color-btn[data-color="pink"] { background: linear-gradient(135deg, #e91e63, #c2185b); }
        .color-btn[data-color="yellow"] { background: linear-gradient(135deg, #f1c40f, #f39c12); }

        .room-code-display {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .room-code-display:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        #lobby input {
            width: 100%;
            padding: 14px 18px;
            margin: 12px 0;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 1rem;
            text-align: center;
            transition: all 0.3s;
            font-family: inherit;
        }

        #lobby input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.2);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        button.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        button.secondary {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        button.secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.5);
        }

        /* منطقة اللعبة */
        #game-area {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 900px;
        }

        #status {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        #board {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: inline-grid;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .dot {
            width: 14px;
            height: 14px;
            background: #2c3e50;
            border-radius: 50%;
            z-index: 3;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        .line {
            cursor: pointer;
            z-index: 2;
            transition: all 0.2s ease;
            position: relative;
            border-radius: 4px;
        }

        .line:hover:not(.taken) {
            transform: scale(1.05);
            filter: brightness(0.95);
        }

        .line.horizontal {
            height: 8px;
            width: 60px;
            border-radius: 4px;
        }

        .line.vertical {
            width: 8px;
            height: 60px;
            border-radius: 4px;
        }

        .line.taken {
            cursor: default;
            transform: none;
        }

        .box {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            transition: all 0.3s ease;
            border-radius: 12px;
            margin: 2px;
            animation: pop 0.3s ease;
        }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .info-panel {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 50px;
            display: flex;
            gap: 30px;
            font-weight: bold;
            color: #2c3e50;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .exit-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: #e74c3c;
            transition: all 0.3s;
            display: none;
            z-index: 100;
            font-family: inherit;
        }

        .exit-btn:hover {
            background: #e74c3c;
            color: white;
            transform: translateX(-5px);
        }

        .winner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .winner-card {
            background: white;
            padding: 40px 60px;
            border-radius: 30px;
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 700px) {
            .line.horizontal { width: 40px; }
            .line.vertical { height: 40px; }
            .box { width: 40px; height: 40px; font-size: 1.2rem; }
            .dot { width: 10px; height: 10px; }
            #board { padding: 20px; }
            .info-panel { flex-direction: column; gap: 8px; text-align: center; }
            #lobby { width: 95%; padding: 25px; }
        }
    </style>
</head>
<body>

    <button class="exit-btn" id="exitBtn" onclick="exitGame()">← مغادرة الغرفة</button>

    <div id="lobby">
        <h2>🎮 النقاط والصناديق</h2>
        
        <div class="color-selector">
            <p>🎨 اختر لونك المفضل:</p>
            <div class="color-options">
                <div class="color-btn" data-color="red" style="background: linear-gradient(135deg, #e74c3c, #c0392b);" onclick="selectColor('red')"></div>
                <div class="color-btn" data-color="blue" style="background: linear-gradient(135deg, #3498db, #2980b9);" onclick="selectColor('blue')"></div>
                <div class="color-btn" data-color="pink" style="background: linear-gradient(135deg, #e91e63, #c2185b);" onclick="selectColor('pink')"></div>
                <div class="color-btn" data-color="yellow" style="background: linear-gradient(135deg, #f1c40f, #f39c12);" onclick="selectColor('yellow')"></div>
            </div>
        </div>

        <div id="roomCodeContainer" style="display: none;">
            <p>🔑 رمز الغرفة (اضغط للنسخ):</p>
            <div class="room-code-display" id="roomCodeDisplay" onclick="copyRoomCode()">----</div>
        </div>

        <input type="text" id="roomInput" placeholder="📝 أدخل رمز الغرفة" autocomplete="off">
        
        <div class="btn-group">
            <button class="primary" onclick="createRoom()">✨ إنشاء غرفة</button>
            <button class="secondary" onclick="joinRoom()">🚪 انضمام لغرفة</button>
        </div>
        
        <div style="margin-top: 20px; font-size: 0.8rem; color: #7f8c8d;">
            🔹 العب مع صديقك أونلاين<br>
            🔹 ارسم الخطوط لتكوين الصناديق<br>
            🔹 صاحب أكبر عدد من الصناديق يفوز
        </div>
    </div>

    <div id="game-area">
        <div id="status">🔄 جاري الاتصال...</div>
        <div id="board"></div>
        <div class="info-panel">
            <span>🏠 الغرفة: <b id="roomNameDisplay">--</b></span>
            <span>🎭 أنت: <b id="playerSide">--</b></span>
            <span id="scoreDisplay">📊 0 - 0</span>
        </div>
    </div>

<script>
    // المؤثرات الصوتية
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        if(type === 'box') {
            oscillator.frequency.value = 523.25; // نغمة C5
            gainNode.gain.value = 0.3;
            oscillator.type = 'sine';
            setTimeout(() => {
                oscillator.frequency.value = 659.25; // نغمة E5
            }, 100);
        } else if(type === 'win') {
            oscillator.frequency.value = 523.25;
            gainNode.gain.value = 0.4;
            oscillator.type = 'triangle';
            setTimeout(() => {
                oscillator.frequency.value = 659.25;
            }, 100);
            setTimeout(() => {
                oscillator.frequency.value = 783.99;
            }, 200);
        } else if(type === 'line') {
            oscillator.frequency.value = 440;
            gainNode.gain.value = 0.15;
            oscillator.type = 'sine';
        }
        
        oscillator.start();
        setTimeout(() => {
            oscillator.stop();
        }, 200);
        
        if(audioContext.state === 'suspended') {
            audioContext.resume();
        }
    }
    
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBjHyON3NjKz2yBxCqwgLftd2trh03HYQc",
        authDomain: "arabic-game-onlin.firebaseapp.com",
        databaseURL: "https://arabic-game-onlin-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "arabic-game-onlin",
        storageBucket: "arabic-game-onlin.firebasestorage.app",
        messagingSenderId: "406939044821",
        appId: "1:406939044821:web:daa86a2fa46483363f8b5c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let roomID = "";
    let myRole = null; 
    let currentTurn = 1;
    let p1Score = 0, p2Score = 0;
    let gameActive = true;
    let myColor = "red";
    let opponentColor = "blue";
    const ROWS = 5, COLS = 5;
    
    const playerEmojis = {
        1: { red: "🔴", blue: "🔵", pink: "💗", yellow: "⭐" },
        2: { red: "🔴", blue: "🔵", pink: "💗", yellow: "⭐" }
    };
    
    const colorStyles = {
        red: { bg: "rgba(231, 76, 60, 0.2)", text: "#e74c3c", line: "linear-gradient(90deg, #e74c3c, #c0392b)" },
        blue: { bg: "rgba(52, 152, 219, 0.2)", text: "#3498db", line: "linear-gradient(90deg, #3498db, #2980b9)" },
        pink: { bg: "rgba(233, 30, 99, 0.2)", text: "#e91e63", line: "linear-gradient(90deg, #e91e63, #c2185b)" },
        yellow: { bg: "rgba(241, 196, 15, 0.2)", text: "#f1c40f", line: "linear-gradient(90deg, #f1c40f, #f39c12)" }
    };

    function selectColor(color) {
        myColor = color;
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.classList.remove('selected');
        });
        document.querySelector(`.color-btn[data-color="${color}"]`).classList.add('selected');
    }

    function generateRoomCode() {
        return Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    function copyRoomCode() {
        const code = document.getElementById('roomCodeDisplay').innerText;
        navigator.clipboard.writeText(code);
        alert("✅ تم نسخ رمز الغرفة: " + code);
    }

    async function createRoom() {
        roomID = generateRoomCode();
        document.getElementById('roomCodeContainer').style.display = 'block';
        document.getElementById('roomCodeDisplay').innerText = roomID;
        document.getElementById('roomInput').value = roomID;
        
        const roomRef = db.ref('rooms/' + roomID);
        myRole = 1;
        await roomRef.set({ 
            turn: 1, 
            p1: true, 
            p2: false, 
            p1Score: 0, 
            p2Score: 0,
            p1Color: myColor,
            p2Color: "blue",
            boxes: {},
            lastMove: "",
            gameActive: true
        });
        
        startUI();
        listenToGame();
    }

    async function joinRoom() {
        roomID = document.getElementById('roomInput').value.trim().toUpperCase();
        if(!roomID) return alert("⚠️ يرجى إدخال رمز الغرفة");

        const roomRef = db.ref('rooms/' + roomID);
        const snapshot = await roomRef.once('value');
        const data = snapshot.val();

        if(!data) return alert("⚠️ الغرفة غير موجودة!");
        if(data.p2) return alert("⚠️ الغرفة ممتلئة باللاعبين.");
        
        myRole = 2;
        opponentColor = data.p1Color || "red";
        await roomRef.update({ p2: true, p2Color: myColor });
        
        startUI();
        listenToGame();
    }

    function startUI() {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-area').style.display = 'flex';
        document.getElementById('exitBtn').style.display = 'block';
        document.getElementById('roomNameDisplay').innerText = roomID;
        
        const colorName = { red: "أحمر", blue: "أزرق", pink: "وردي", yellow: "أصفر" };
        document.getElementById('playerSide').innerHTML = myRole === 1 ? `🎨 ${colorName[myColor]} (اللاعب 1)` : `🎨 ${colorName[myColor]} (اللاعب 2)`;
        createBoard();
    }

    function createBoard() {
        const board = document.getElementById('board');
        board.style.gridTemplateColumns = `repeat(${COLS}, 12px 60px) 12px`;
        board.innerHTML = '';
        
        for (let r = 0; r <= ROWS; r++) {
            for (let c = 0; c <= COLS; c++) {
                const dot = document.createElement('div'); 
                dot.className = 'dot'; 
                board.appendChild(dot);

                if (c < COLS) {
                    const line = document.createElement('div');
                    line.className = 'line horizontal';
                    line.id = `line-h-${r}-${c}`;
                    line.onclick = () => makeMove(r, c, 'h');
                    board.appendChild(line);
                }
            }
            if (r < ROWS) {
                for (let c = 0; c <= COLS; c++) {
                    const line = document.createElement('div');
                    line.className = 'line vertical';
                    line.id = `line-v-${r}-${c}`;
                    line.onclick = () => makeMove(r, c, 'v');
                    board.appendChild(line);

                    if (c < COLS) {
                        const box = document.createElement('div'); 
                        box.className = 'box';
                        box.id = `box-${r}-${c}`; 
                        board.appendChild(box);
                    }
                }
            }
        }
    }

    function makeMove(r, c, type) {
        if(!gameActive) return;
        if(currentTurn !== myRole) {
            showTemporaryMessage("⏳ ليس دورك الآن!", "#e74c3c");
            return; 
        }
        
        const lineId = `line-${type}-${r}-${c}`;
        const lineElement = document.getElementById(lineId);
        if(lineElement.classList.contains('taken')) {
            showTemporaryMessage("❌ هذا الخط مرسوم مسبقاً!", "#e74c3c");
            return;
        }
        
        playSound('line');
        
        db.ref(`rooms/${roomID}`).update({
            lastMove: { r, c, type, player: myRole, timestamp: Date.now() }
        });
    }

    function showTemporaryMessage(msg, color) {
        const status = document.getElementById('status');
        const originalText = status.innerText;
        const originalColor = status.style.color;
        status.innerText = msg;
        status.style.color = color;
        setTimeout(() => {
            status.innerText = originalText;
            status.style.color = originalColor;
        }, 1500);
    }

    function listenToGame() {
        db.ref(`rooms/${roomID}`).on('value', snapshot => {
            const data = snapshot.val();
            if(!data) return;

            currentTurn = data.turn;
            p1Score = data.p1Score || 0;
            p2Score = data.p2Score || 0;
            gameActive = data.gameActive !== false;
            
            const p1Color = data.p1Color || "red";
            const p2Color = data.p2Color || "blue";
            
            updateColorsInCSS(p1Color, p2Color);
            updateScoreDisplay();

            if(data.lastMove && data.lastMove.timestamp) {
                renderMove(data.lastMove.r, data.lastMove.c, data.lastMove.type, data.lastMove.player, p1Color, p2Color);
                if(data.lastMove.player === myRole) {
                    db.ref(`rooms/${roomID}/lastMove`).set("");
                }
            }

            const status = document.getElementById('status');
            if(!data.p2) {
                status.innerHTML = "👥 في انتظار دخول الخصم...";
                status.style.color = "#7f8c8d";
            } else if(!gameActive) {
                const winner = p1Score > p2Score ? 1 : (p2Score > p1Score ? 2 : 0);
                if(winner === myRole) {
                    status.innerHTML = "🏆 لقد فزت! 🏆";
                    status.style.color = "#27ae60";
                    playSound('win');
                } else if(winner === 0) {
                    status.innerHTML = "🤝 تعادل! 🤝";
                    status.style.color = "#f39c12";
                } else {
                    status.innerHTML = "😢 لقد خسرت... 😢";
                    status.style.color = "#e74c3c";
                }
                showWinnerMessage(winner);
            } else {
                if(currentTurn === myRole) {
                    status.innerHTML = "🎯 دورك الآن! اضغط على خط لتلعبه 🎯";
                    status.style.color = myRole === 1 ? "#e74c3c" : "#3498db";
                } else {
                    status.innerHTML = "⏳ انتظر دور الخصم... ⏳";
                    status.style.color = "#bdc3c7";
                }
            }
        });
    }
    
    function updateColorsInCSS(p1Color, p2Color) {
        const style = document.createElement('style');
        style.id = 'dynamic-colors';
        const oldStyle = document.getElementById('dynamic-colors');
        if(oldStyle) oldStyle.remove();
        
        style.id = 'dynamic-colors';
        style.textContent = `
            .line.taken.p1 { background: ${colorStyles[p1Color].line}; box-shadow: 0 0 12px ${colorStyles[p1Color].text}; }
            .line.taken.p2 { background: ${colorStyles[p2Color].line}; box-shadow: 0 0 12px ${colorStyles[p2Color].text}; }
            .box.p1 { background: ${colorStyles[p1Color].bg}; color: ${colorStyles[p1Color].text}; }
            .box.p2 { background: ${colorStyles[p2Color].bg}; color: ${colorStyles[p2Color].text}; }
        `;
        document.head.appendChild(style);
    }

    function updateScoreDisplay() {
        const scoreDiv = document.getElementById('scoreDisplay');
        if(scoreDiv) {
            scoreDiv.innerHTML = `🔴 ${p1Score} - ${p2Score} 🔵`;
        }
    }

    function renderMove(r, c, type, player, p1Color, p2Color) {
        const line = document.getElementById(`line-${type}-${r}-${c}`);
        if(!line || line.classList.contains('taken')) return;

        line.classList.add('taken', `p${player}`);
        const scored = checkBoxes(r, c, type, player, p1Color, p2Color);

        if(myRole === 1 && gameActive) {
            if(!scored) {
                db.ref(`rooms/${roomID}/turn`).set(player === 1 ? 2 : 1);
            }
        }
    }

    function checkBoxes(r, c, type, player, p1Color, p2Color) {
        let scored = false;
        const playerColor = player === 1 ? p1Color : p2Color;
        const emoji = player === 1 ? (playerColor === 'red' ? '🔴' : (playerColor === 'blue' ? '🔵' : (playerColor === 'pink' ? '💗' : '⭐'))) : 
                                          (playerColor === 'red' ? '🔴' : (playerColor === 'blue' ? '🔵' : (playerColor === 'pink' ? '💗' : '⭐')));
        
        const check = (row, col) => {
            if(row < 0 || row >= ROWS || col < 0 || col >= COLS) return false;
            
            const hT = document.getElementById(`line-h-${row}-${col}`);
            const hB = document.getElementById(`line-h-${row+1}-${col}`);
            const vL = document.getElementById(`line-v-${row}-${col}`);
            const vR = document.getElementById(`line-v-${row}-${col+1}`);

            if(hT && hB && vL && vR &&
               hT.classList.contains('taken') && hB.classList.contains('taken') && 
               vL.classList.contains('taken') && vR.classList.contains('taken')) {
                const box = document.getElementById(`box-${row}-${col}`);
                if(box && !box.classList.contains('filled')) {
                    box.classList.add('filled', `p${player}`);
                    box.innerText = emoji;
                    scored = true;
                    playSound('box');
                    
                    if(player === 1) {
                        p1Score++;
                        db.ref(`rooms/${roomID}/p1Score`).set(p1Score);
                    } else {
                        p2Score++;
                        db.ref(`rooms/${roomID}/p2Score`).set(p2Score);
                    }
                    updateScoreDisplay();
                    
                    const totalBoxes = ROWS * COLS;
                    if(p1Score + p2Score === totalBoxes) {
                        db.ref(`rooms/${roomID}/gameActive`).set(false);
                        const winner = p1Score > p2Score ? 1 : (p2Score > p1Score ? 2 : 0);
                        if(winner !== 0) playSound('win');
                        showWinnerMessage(winner);
                    }
                    return true;
                }
            }
            return false;
        };

        if(type === 'h') {
            check(r-1, c);
            check(r, c);
        } else {
            check(r, c-1);
            check(r, c);
        }
        return scored;
    }

    function showWinnerMessage(winner) {
        setTimeout(() => {
            if(document.querySelector('.winner-overlay')) return;
            const overlay = document.createElement('div');
            overlay.className = 'winner-overlay';
            if(winner === 0) {
                overlay.innerHTML = `
                    <div class="winner-card">
                        <h2>🤝 تعادل! 🤝</h2>
                        <p>انتهت اللعبة بالتعادل</p>
                        <button onclick="resetGame()">🎮 العب مرة أخرى</button>
                    </div>
                `;
            } else if(winner === myRole) {
                overlay.innerHTML = `
                    <div class="winner-card">
                        <h2>🎉 لقد فزت! 🎉</h2>
                        <p>تهانينا! لقد لعبت بشكل رائع</p>
                        <button onclick="resetGame()">🎮 العب مرة أخرى</button>
                    </div>
                `;
            } else {
                overlay.innerHTML = `
                    <div class="winner-card">
                        <h2>😢 لقد خسرت! 😢</h2>
                        <p>حظاً أوفر في المرة القادمة</p>
                        <button onclick="resetGame()">🎮 العب مرة أخرى</button>
                    </div>
                `;
            }
            document.body.appendChild(overlay);
        }, 500);
    }

    async function resetGame() {
        const roomRef = db.ref(`rooms/${roomID}`);
        await roomRef.update({
            turn: 1,
            p1Score: 0,
            p2Score: 0,
            boxes: {},
            gameActive: true,
            lastMove: ""
        });
        
        p1Score = 0;
        p2Score = 0;
        updateScoreDisplay();
        
        const overlays = document.querySelectorAll('.winner-overlay');
        overlays.forEach(overlay => overlay.remove());
        
        createBoard();
        
        const snapshot = await roomRef.once('value');
        const data = snapshot.val();
        if(data && data.boxes) {
            for(let i = 0; i < ROWS; i++) {
                for(let j = 0; j < COLS; j++) {
                    const box = document.getElementById(`box-${i}-${j}`);
                    if(box) {
                        box.classList.remove('filled', 'p1', 'p2');
                        box.innerText = '';
                    }
                }
            }
            for(let i = 0; i <= ROWS; i++) {
                for(let j = 0; j < COLS; j++) {
                    const hLine = document.getElementById(`line-h-${i}-${j}`);
                    if(hLine) hLine.classList.remove('taken', 'p1', 'p2');
                }
            }
            for(let i = 0; i < ROWS; i++) {
                for(let j = 0; j <= COLS; j++) {
                    const vLine = document.getElementById(`line-v-${i}-${j}`);
                    if(vLine) vLine.classList.remove('taken', 'p1', 'p2');
                }
            }
        }
    }

    async function exitGame() {
        if(roomID) {
            const roomRef = db.ref(`rooms/${roomID}`);
            if(myRole === 1) {
                await roomRef.remove();
            } else {
                await roomRef.update({ p2: false });
            }
            db.ref(`rooms/${roomID}`).off();
        }
        document.getElementById('lobby').style.display = 'block';
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('exitBtn').style.display = 'none';
        document.getElementById('roomCodeContainer').style.display = 'none';
        document.getElementById('roomInput').value = '';
        roomID = '';
        myRole = null;
        
        const overlays = document.querySelectorAll('.winner-overlay');
        overlays.forEach(overlay => overlay.remove());
    }
    
    selectColor('red');
</script>
</body>
</html>
