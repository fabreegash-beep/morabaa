<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dots & Boxes Pro 🏆</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --dark-bg: #0f172a;
            --pink: #ff85a2;
            --blue: #38bdf8;
            --accent: #6366f1;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--dark-bg);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
            color: white; overflow: hidden;
        }

        /* واجهة اللوبي */
        #lobby { 
            background: rgba(30, 41, 59, 0.8); padding: 40px; border-radius: 30px; 
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
            text-align: center; width: 380px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .input-box { 
            background: #0f172a; border: 2px solid #334155; border-radius: 15px;
            padding: 15px; color: white; width: 100%; box-sizing: border-box;
            font-size: 1.5rem; text-align: center; margin-bottom: 10px; letter-spacing: 5px;
        }

        .gen-code { color: #94a3b8; font-size: 0.8rem; cursor: pointer; margin-bottom: 20px; display: block; }

        .color-options { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .color-dot { 
            width: 50px; height: 50px; border-radius: 15px; cursor: pointer; 
            border: 3px solid transparent; transition: 0.3s; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
        }
        .color-dot.selected { border-color: white; transform: scale(1.1); box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1.1rem; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }

        /* منطقة اللعبة */
        #game-area { display: none; flex-direction: column; align-items: center; }

        .status-header {
            background: rgba(30, 41, 59, 0.9); padding: 15px 25px; border-radius: 20px;
            margin-bottom: 20px; width: 100%; display: flex; justify-content: space-between; align-items: center;
        }

        #board { display: grid; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        .dot { width: 10px; height: 10px; background: #64748b; border-radius: 50%; }
        .line { background: #1e293b; cursor: pointer; transition: 0.2s; border-radius: 5px; }
        .line.horizontal { height: 10px; width: 50px; }
        .line.vertical { width: 10px; height: 50px; }
        .line.taken { box-shadow: 0 0 10px currentColor; }

        .box { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }

        /* حركات الإيموجي */
        .emoji-pop {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            70% { transform: scale(1.5) rotate(10deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        .active-turn { animation: blink 1s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="lobby">
        <h1 style="margin-top:0">Dots & Boxes 🎮</h1>
        <input type="text" id="roomInput" class="input-box" placeholder="000000" maxlength="6">
        <span class="gen-code" onclick="generateCode()">🎲 توليد كود رقمي عشوائي</span>

        <div class="color-options">
            <div class="color-dot selected" style="background: var(--pink)" data-color="#ff85a2" data-emoji="💖">💖</div>
            <div class="color-dot" style="background: var(--blue)" data-color="#38bdf8" data-emoji="💪">💪</div>
            <div class="color-dot" style="background: #4ade80" data-color="#4ade80" data-emoji="🌟">🌟</div>
            <div class="color-dot" style="background: #fbbf24" data-color="#fbbf24" data-emoji="🔥">🔥</div>
        </div>

        <button class="btn btn-primary" onclick="joinRoom('create')">إنشاء غرفة</button>
        <button class="btn btn-secondary" onclick="joinRoom('join')">انضمام سريع</button>
    </div>

    <div id="game-area">
        <div class="status-header">
            <div id="turnTxt" style="font-weight:bold">انتظار...</div>
            <div id="roomDisp" onclick="copyRoom()" style="cursor:pointer; color:gray">#000000 📋</div>
        </div>
        <div id="board"></div>
    </div>

    <audio id="soundMove" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="soundScore" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBjHyON3NjKz2yBxCqwgLftd2trh03HYQc",
      authDomain: "arabic-game-onlin.firebaseapp.com",
      databaseURL: "https://arabic-game-onlin-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "arabic-game-onlin",
      storageBucket: "arabic-game-onlin.firebasestorage.app",
      messagingSenderId: "406939044821",
      appId: "1:406939044821:web:daa86a2fa46483363f8b5c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let roomID, myRole, currentTurn;
    let myColor = "#ff85a2", myEmoji = "💖";
    let playersData = {};

    function generateCode() {
        const code = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('roomInput').value = code;
    }

    document.querySelectorAll('.color-dot').forEach(dot => {
        dot.addEventListener('click', () => {
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
            dot.classList.add('selected');
            myColor = dot.dataset.color;
            myEmoji = dot.dataset.emoji;
        });
    });

    async function joinRoom(mode) {
        roomID = document.getElementById('roomInput').value.trim();
        if(roomID.length < 4) return alert("الرجاء إدخال كود رقمي صحيح");

        const ref = db.ref('rooms/' + roomID);
        const snap = await ref.once('value');
        const data = snap.val();

        if(mode === 'create') {
            if(data) return alert("الغرفة ممتلئة أو موجودة");
            myRole = 1;
            await ref.set({ turn: 1, p1:true, p2:false, c1:myColor, e1:myEmoji, lastMove: "" });
        } else {
            if(!data) return alert("الغرفة غير موجودة");
            myRole = 2;
            await ref.update({ p2:true, c2:myColor, e2:myEmoji });
        }
        startGame();
    }

    function startGame() {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-area').style.display = 'flex';
        document.getElementById('roomDisp').innerText = "#" + roomID + " 📋";
        
        const board = document.getElementById('board');
        const SIZE = 5;
        board.style.gridTemplateColumns = `repeat(${SIZE}, 10px 50px) 10px`;
        
        for (let r = 0; r <= SIZE; r++) {
            for (let c = 0; c <= SIZE; c++) {
                const dot = document.createElement('div'); dot.className='dot'; board.appendChild(dot);
                if(c < SIZE) addLine(r, c, 'h', board);
            }
            if(r < SIZE) {
                for (let c = 0; c <= SIZE; c++) {
                    addLine(r, c, 'v', board);
                    if(c < SIZE) {
                        const box = document.createElement('div'); box.className='box';
                        box.id = `box-${r}-${c}`; board.appendChild(box);
                    }
                }
            }
        }
        listen();
    }

    function addLine(r, c, type, container) {
        const l = document.createElement('div');
        l.className = `line ${type==='h'?'horizontal':'vertical'}`;
        l.id = `line-${type}-${r}-${c}`;
        l.onclick = () => {
            if(currentTurn === myRole && !l.classList.contains('taken')) {
                db.ref(`rooms/${roomID}`).update({
                    lastMove: { r, c, type, p: myRole, t: Date.now() }
                });
                document.getElementById('soundMove').play();
            }
        };
        container.appendChild(l);
    }

    function listen() {
        db.ref(`rooms/${roomID}`).on('value', snap => {
            const d = snap.val();
            if(!d) return;
            currentTurn = d.turn;
            playersData = { 1: {c: d.c1, e: d.e1}, 2: {c: d.c2, e: d.e2} };

            if(d.lastMove) {
                const m = d.lastMove;
                const line = document.getElementById(`line-${m.type}-${m.r}-${m.c}`);
                if(!line.classList.contains('taken')) {
                    line.style.background = playersData[m.p].c;
                    line.classList.add('taken');
                    check(m.r, m.c, m.type, m.p);
                }
            }

            const txt = document.getElementById('turnTxt');
            if(!d.p2) txt.innerText = "⏳ انتظار الخصم...";
            else {
                txt.innerText = (currentTurn === myRole) ? "🟢 دورك الآن" : "🔴 دور الخصم";
                txt.style.color = playersData[currentTurn].c;
            }
        });
    }

    function check(r, c, type, p) {
        let scored = false;
        const SIZE = 5;
        const find = (row, col) => {
            if(row<0 || row>=SIZE || col<0 || col>=SIZE) return;
            const hT = document.getElementById(`line-h-${row}-${col}`);
            const hB = document.getElementById(`line-h-${row+1}-${col}`);
            const vL = document.getElementById(`line-v-${row}-${col}`);
            const vR = document.getElementById(`line-v-${row}-${col+1}`);

            if(hT.classList.contains('taken') && hB.classList.contains('taken') && vL.classList.contains('taken') && vR.classList.contains('taken')) {
                const b = document.getElementById(`box-${row}-${col}`);
                if(!b.innerHTML) {
                    b.innerHTML = `<span class="emoji-pop">${playersData[p].e}</span>`;
                    b.style.background = playersData[p].c + "22";
                    document.getElementById('soundScore').play();
                    scored = true;
                }
            }
        };

        if(type==='h') { find(r-1, c); find(r, c); } else { find(r, c-1); find(r, c); }
        if(myRole === 1 && !scored) db.ref(`rooms/${roomID}/turn`).set(p === 1 ? 2 : 1);
    }

    function copyRoom() {
        navigator.clipboard.writeText(roomID);
        alert("تم نسخ الكود الرقمي: " + roomID);
    }
</script>
</body>
</html>
