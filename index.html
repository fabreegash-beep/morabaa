<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>النقاط والصناديق - نسخة التحدي السريع</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #lobby {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            width: 450px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #lobby h2 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.8rem;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .color-selector { margin: 20px 0; padding: 15px; background: #f0f0f0; border-radius: 20px; }
        .color-options { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .color-btn { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; transition: all 0.3s; border: 3px solid transparent; }
        .color-btn.selected { border-color: #2c3e50; transform: scale(1.1); }

        .room-code-display {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 5px;
            cursor: pointer;
        }

        #lobby input { width: 100%; padding: 14px 18px; margin: 12px 0; border: 2px solid #e0e0e0; border-radius: 50px; text-align: center; }
        button { flex: 1; padding: 12px 20px; cursor: pointer; border: none; border-radius: 50px; font-weight: bold; transition: all 0.3s; }
        button.primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        button.secondary { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }

        #game-area { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 900px; }
        #status {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            min-width: 300px;
        }

        #board { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 30px; display: inline-grid; }
        .dot { width: 14px; height: 14px; background: #2c3e50; border-radius: 50%; z-index: 3; }
        .line { cursor: pointer; z-index: 2; transition: all 0.2s; border-radius: 4px; position: relative; }
        .line.horizontal { height: 8px; width: 60px; }
        .line.vertical { width: 8px; height: 60px; }
        .line.taken { cursor: default; }
        .box { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; border-radius: 12px; }

        .info-panel { margin-top: 25px; background: rgba(255, 255, 255, 0.9); padding: 12px 25px; border-radius: 50px; display: flex; gap: 30px; font-weight: bold; }
        .exit-btn { position: fixed; top: 20px; left: 20px; background: white; padding: 10px 20px; border-radius: 50px; cursor: pointer; color: #e74c3c; display: none; z-index: 100; border: none; font-weight: bold; }
        
        .winner-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .winner-card { background: white; padding: 40px; border-radius: 30px; text-align: center; }
        
        /* شريط الوقت */
        #timer-bar { width: 100%; height: 5px; background: #eee; margin-top: 10px; border-radius: 5px; overflow: hidden; }
        #timer-progress { height: 100%; background: #e74c3c; width: 100%; transition: width 1s linear; }

        @media (max-width: 700px) {
            .line.horizontal { width: 40px; }
            .line.vertical { height: 40px; }
            .box { width: 40px; height: 40px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <button class="exit-btn" id="exitBtn" onclick="exitGame()">← مغادرة</button>

    <div id="lobby">
        <h2>🎮 النقاط والصناديق</h2>
        <div class="color-selector">
            <p>🎨 اختر لونك:</p>
            <div class="color-options">
                <div class="color-btn" data-color="red" style="background: #e74c3c;" onclick="selectColor('red')"></div>
                <div class="color-btn" data-color="blue" style="background: #3498db;" onclick="selectColor('blue')"></div>
                <div class="color-btn" data-color="pink" style="background: #e91e63;" onclick="selectColor('pink')"></div>
                <div class="color-btn" data-color="yellow" style="background: #f1c40f;" onclick="selectColor('yellow')"></div>
            </div>
        </div>
        <div id="roomCodeContainer" style="display: none;">
            <div class="room-code-display" id="roomCodeDisplay" onclick="copyRoomCode()">----</div>
        </div>
        <input type="text" id="roomInput" placeholder="📝 رمز الغرفة">
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="primary" onclick="createRoom()">إنشاء غرفة</button>
            <button class="secondary" onclick="joinRoom()">انضمام</button>
        </div>
    </div>

    <div id="game-area">
        <div id="status">جاري التحميل...</div>
        <div id="timer-bar"><div id="timer-progress"></div></div>
        <div id="board"></div>
        <div class="info-panel">
            <span>🏠 <b id="roomNameDisplay">--</b></span>
            <span>🎭 <b id="playerSide">--</b></span>
            <span id="scoreDisplay">📊 0 - 0</span>
        </div>
    </div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBjHyON3NjKz2yBxCqwgLftd2trh03HYQc",
        authDomain: "arabic-game-onlin.firebaseapp.com",
        databaseURL: "https://arabic-game-onlin-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "arabic-game-onlin",
        storageBucket: "arabic-game-onlin.firebasestorage.app",
        messagingSenderId: "406939044821",
        appId: "1:406939044821:web:daa86a2fa46483363f8b5c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let roomID = "";
    let myRole = null; 
    let currentTurn = 1;
    let p1Score = 0, p2Score = 0;
    let gameActive = true;
    let myColor = "red";
    let timeLeft = 8;
    let timerInterval = null;
    let bonusTurns = 0;
    const ROWS = 5, COLS = 5;

    const colorStyles = {
        red: { bg: "rgba(231, 76, 60, 0.2)", text: "#e74c3c", line: "linear-gradient(90deg, #e74c3c, #c0392b)" },
        blue: { bg: "rgba(52, 152, 219, 0.2)", text: "#3498db", line: "linear-gradient(90deg, #3498db, #2980b9)" },
        pink: { bg: "rgba(233, 30, 99, 0.2)", text: "#e91e63", line: "linear-gradient(90deg, #e91e63, #c2185b)" },
        yellow: { bg: "rgba(241, 196, 15, 0.2)", text: "#f1c40f", line: "linear-gradient(90deg, #f1c40f, #f39c12)" }
    };

    function selectColor(color) {
        myColor = color;
        document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('selected'));
        document.querySelector(`.color-btn[data-color="${color}"]`).classList.add('selected');
    }

    async function createRoom() {
        roomID = Math.random().toString(36).substring(2, 8).toUpperCase();
        myRole = 1;
        await db.ref('rooms/' + roomID).set({
            turn: 1, p1: true, p2: false, p1Score: 0, p2Score: 0,
            p1Color: myColor, p2Color: "blue", gameActive: true, bonusTurns: 0
        });
        document.getElementById('roomCodeContainer').style.display = 'block';
        document.getElementById('roomCodeDisplay').innerText = roomID;
        startUI();
        listenToGame();
    }

    async function joinRoom() {
        roomID = document.getElementById('roomInput').value.trim().toUpperCase();
        const snap = await db.ref('rooms/' + roomID).once('value');
        if(!snap.exists()) return alert("الغرفة غير موجودة");
        myRole = 2;
        await db.ref('rooms/' + roomID).update({ p2: true, p2Color: myColor });
        startUI();
        listenToGame();
    }

    function startUI() {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-area').style.display = 'flex';
        document.getElementById('exitBtn').style.display = 'block';
        document.getElementById('roomNameDisplay').innerText = roomID;
        document.getElementById('playerSide').innerText = `لاعب ${myRole}`;
        createBoard();
    }

    function createBoard() {
        const board = document.getElementById('board');
        board.style.gridTemplateColumns = `repeat(${COLS}, 12px 60px) 12px`;
        board.innerHTML = '';
        for (let r = 0; r <= ROWS; r++) {
            for (let c = 0; c <= COLS; c++) {
                const dot = document.createElement('div'); dot.className = 'dot'; board.appendChild(dot);
                if (c < COLS) {
                    const line = document.createElement('div'); line.className = 'line horizontal';
                    line.id = `line-h-${r}-${c}`; line.onclick = () => makeMove(r, c, 'h');
                    board.appendChild(line);
                }
            }
            if (r < ROWS) {
                for (let c = 0; c <= COLS; c++) {
                    const line = document.createElement('div'); line.className = 'line vertical';
                    line.id = `line-v-${r}-${c}`; line.onclick = () => makeMove(r, c, 'v');
                    board.appendChild(line);
                    if (c < COLS) {
                        const box = document.createElement('div'); box.className = 'box';
                        box.id = `box-${r}-${c}`; board.appendChild(box);
                    }
                }
            }
        }
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 8;
        const bar = document.getElementById('timer-progress');
        bar.style.width = "100%";
        
        timerInterval = setInterval(async () => {
            timeLeft--;
            bar.style.width = (timeLeft / 8 * 100) + "%";
            
            if(currentTurn === myRole) {
                document.getElementById('status').innerText = `⏳ دورك! باقي ${timeLeft} ثوانٍ`;
            }

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                if (currentTurn === myRole) {
                    // إذا انتهى الوقت ولم يلعب، ينتقل الدور للخصم مع ميزة دورين
                    const nextTurn = myRole === 1 ? 2 : 1;
                    await db.ref(`rooms/${roomID}`).update({
                        turn: nextTurn,
                        bonusTurns: 1 // اللاعب القادم لديه دور إضافي واحد (المجموع دورين)
                    });
                }
            }
        }, 1000);
    }

    function makeMove(r, c, type) {
        if(!gameActive || currentTurn !== myRole) return;
        const line = document.getElementById(`line-${type}-${r}-${c}`);
        if(line.classList.contains('taken')) return;

        db.ref(`rooms/${roomID}`).update({
            lastMove: { r, c, type, player: myRole, timestamp: Date.now() }
        });
    }

    function listenToGame() {
        db.ref(`rooms/${roomID}`).on('value', snapshot => {
            const data = snapshot.val();
            if(!data) return;

            currentTurn = data.turn;
            bonusTurns = data.bonusTurns || 0;
            p1Score = data.p1Score || 0;
            p2Score = data.p2Score || 0;
            gameActive = data.gameActive !== false;
            updateColorsInCSS(data.p1Color, data.p2Color);
            document.getElementById('scoreDisplay').innerText = `📊 ${p1Score} - ${p2Score}`;

            if(data.lastMove) {
                renderMove(data.lastMove.r, data.lastMove.c, data.lastMove.type, data.lastMove.player, data.p1Color, data.p2Color);
                if(data.lastMove.player === myRole) db.ref(`rooms/${roomID}/lastMove`).set(null);
            }

            if(gameActive) {
                startTimer();
                if(currentTurn !== myRole) {
                    document.getElementById('status').innerText = "⏳ انتظر الخصم...";
                }
            } else {
                clearInterval(timerInterval);
                document.getElementById('status').innerText = "انتهت اللعبة!";
            }
        });
    }

    function renderMove(r, c, type, player, p1Color, p2Color) {
        const line = document.getElementById(`line-${type}-${r}-${c}`);
        if(!line || line.classList.contains('taken')) return;

        line.classList.add('taken', `p${player}`);
        const scored = checkBoxes(r, c, type, player, p1Color, p2Color);

        // منطق تبديل الأدوار (فقط اللاعب 1 يدير المنطق لتجنب التكرار)
        if(myRole === 1 && gameActive) {
            if(!scored) {
                if(bonusTurns > 0) {
                    db.ref(`rooms/${roomID}`).update({ bonusTurns: bonusTurns - 1 });
                } else {
                    db.ref(`rooms/${roomID}`).update({ turn: player === 1 ? 2 : 1, bonusTurns: 0 });
                }
            }
        }
    }

    function checkBoxes(r, c, type, player, p1Color, p2Color) {
        let scored = false;
        const check = (row, col) => {
            if(row < 0 || row >= ROWS || col < 0 || col >= COLS) return;
            const hT = document.getElementById(`line-h-${row}-${col}`);
            const hB = document.getElementById(`line-h-${row+1}-${col}`);
            const vL = document.getElementById(`line-v-${row}-${col}`);
            const vR = document.getElementById(`line-v-${row}-${col+1}`);

            if(hT?.classList.contains('taken') && hB?.classList.contains('taken') && 
               vL?.classList.contains('taken') && vR?.classList.contains('taken')) {
                const box = document.getElementById(`box-${row}-${col}`);
                if(!box.classList.contains('filled')) {
                    box.classList.add('filled', `p${player}`);
                    box.innerText = player === 1 ? "🔴" : "🔵";
                    scored = true;
                    if(player === 1) { p1Score++; db.ref(`rooms/${roomID}/p1Score`).set(p1Score); }
                    else { p2Score++; db.ref(`rooms/${roomID}/p2Score`).set(p2Score); }
                    if(p1Score + p2Score === ROWS * COLS) db.ref(`rooms/${roomID}/gameActive`).set(false);
                }
            }
        };
        if(type === 'h') { check(r-1, c); check(r, c); }
        else { check(r, c-1); check(r, c); }
        return scored;
    }

    function updateColorsInCSS(p1Color, p2Color) {
        let style = document.getElementById('dynamic-colors');
        if(!style) { style = document.createElement('style'); style.id = 'dynamic-colors'; document.head.appendChild(style); }
        style.textContent = `
            .line.taken.p1 { background: ${colorStyles[p1Color].line}; }
            .line.taken.p2 { background: ${colorStyles[p2Color].line}; }
            .box.p1 { background: ${colorStyles[p1Color].bg}; }
            .box.p2 { background: ${colorStyles[p2Color].bg}; }
        `;
    }

    function exitGame() { location.reload(); }
    selectColor('red');
</script>
</body>
</html>
